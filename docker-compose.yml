version: '3.8'

services:
  reflexion-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_MODEL=llama-3.1-8b-instant
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./reflexion_logs.md:/app/reflexion_logs.md
    restart: unless-stopped